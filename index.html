<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поиск домов на улице</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Поиск домов на улице</h1>
        <div id="apiKeySection">
            <label for="apiKeyInput">Введите API-ключ Яндекс.Карт:</label>
            <input type="text" id="apiKeyInput" placeholder="Ваш API-ключ">
            <button id="saveApiKeyButton">Сохранить ключ</button>
            <p id="apiKeyError" class="error-message" style="display: none;">Пожалуйста, введите корректный API-ключ.</p>
        </div>
        <form id="searchForm">
            <input type="text" id="cityInput" placeholder="Введите город" required>
            <p id="cityError" class="error-message" style="display: none;">Пожалуйста, введите название города.</p>
            <input type="text" id="streetInput" placeholder="Введите название улицы" required>
            <p id="streetError" class="error-message" style="display: none;">Пожалуйста, введите название улицы.</p>
            <input type="number" id="houseCountInput" placeholder="Количество домов (1-300)" min="1" max="300" required>
            <p id="houseCountError" class="error-message" style="display: none;">Пожалуйста, введите число от 1 до 300.</p>
            <button type="submit">Найти</button>
        </form>
        <div id="history"></div>
        <div id="loading" style="display: none;">
            <div class="spinner"></div>
            <p>Загрузка...</p>
        </div>
        <div id="filterSection" style="margin-top: 20px;">
            <input type="text" id="filterInput" placeholder="Фильтр по адресу">
            <select id="sortSelect">
                <option value="address">Сортировать по адресу</option>
                <option value="coordinates">Сортировать по координатам</option>
            </select>
        </div>
        <div id="results"></div>
        <div id="map" style="width: 100%; height: 400px; margin-top: 20px;"></div>
        <button id="exportButton" style="margin-top: 20px;">Экспорт в JSON</button>
        <button id="exportCSVButton" style="margin-top: 20px;">Экспорт в CSV</button>
        <button id="loadButton" style="margin-top: 20px;">Показать выбранные улицы</button>
        <div id="savedStreets" style="margin-top: 20px;">
            <h3>Сохраненные улицы</h3>
            <div id="streetList"></div>
        </div>
        <div style="margin-top: 20px;">
            <input type="file" id="importFileInput" accept=".json" style="display: none;">
            <button id="importButton">Импорт данных</button>
        </div>
        <button id="themeToggle" class="theme-toggle">Темная тема</button>
    </div>
    <div id="notification" class="notification" style="display: none;"></div>
    <script src="script.js"></script>
</body>
</html>
